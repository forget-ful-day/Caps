# Gradle version catalog
[versions]
agp = "8.5.0"
room = "2.6.1"
junit = "4.13.2"
extJunit = "1.1.5"
espresso = "3.5.1"

[libraries]
androidx-appcompat = "androidx.appcompat:appcompat:1.6.1"
material = "com.google.android.material:material:1.11.0"
androidx-constraintlayout = "androidx.constraintlayout:constraintlayout:2.1.4"
lifecycle-viewmodel = "androidx.lifecycle:lifecycle-viewmodel:2.7.0"
lifecycle-livedata = "androidx.lifecycle:lifecycle-livedata:2.7.0"
lifecycle-common = "androidx.lifecycle:lifecycle-common:2.7.0"
room-runtime = { module = "androidx.room:room-runtime", version.ref = "room" }
room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }

[test-libraries]
junit = { module = "junit:junit", version.ref = "junit" }
ext-junit = { module = "androidx.test.ext:junit", version.ref = "extJunit" }
espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso" }
